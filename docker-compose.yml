# ──────────────────────────────────────────────────────────────
# OSSPREY — Docker Compose (macOS Local Development)
# ──────────────────────────────────────────────────────────────
services:

  # ── MongoDB ────────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: ossprey-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - ossprey_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask Backend API ──────────────────────────────────────
  backend:
    build:
      context: ./OSSPREY-BackEnd-Server
      dockerfile: ../docker/backend.Dockerfile
    container_name: ossprey-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: ${MONGODB_URI}
      GITHUB_TOKEN_1: ${GITHUB_TOKEN_1}
      GITHUB_TOKEN_2: ${GITHUB_TOKEN_2}
      GITHUB_TOKEN_3: ${GITHUB_TOKEN_3}
      GITHUB_TOKEN_4: ${GITHUB_TOKEN_4}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN_1}
      PEX_GENERATOR_DIR: /opt/ossprey/pex-forecaster
      OSS_SCRAPER_DIR: /opt/ossprey/scraper
      REACT_API_DIR: /opt/ossprey/react-api
    ports:
      - "5001:5000"
    volumes:
      - ./OSSPREY-BackEnd-Server:/app
      - ./OSSPREY-Pex-Forecaster:/opt/ossprey/pex-forecaster
      - ./OSSPREY-OSS-Scraper-Tool:/opt/ossprey/scraper
      - ./OSSPREY-ReACT-API:/opt/ossprey/react-api

  # ── Vue 3 / Vite Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./OSSPREY-FrontEnd-Server
      dockerfile: ../docker/frontend.Dockerfile
    container_name: ossprey-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./OSSPREY-FrontEnd-Server:/app
      - frontend_node_modules:/app/node_modules

volumes:
  ossprey_mongo_data:
    name: ossprey_mongo_data
  frontend_node_modules:
    name: ossprey_frontend_node_modules
